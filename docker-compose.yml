services:
  web:
    build: ./apps/web
    command: npm run dev
    ports: ["3000:3000"]
    volumes: ["./apps/web:/app"]
    environment: ["NEXT_PUBLIC_API_URL=http://localhost:8000"]
  api:
    build: ./services/api
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+psycopg://chainscribe:chainscribe@postgres:5432/chainscribe
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
    depends_on: [postgres, redis, neo4j, kafka]
  postgres:
    image: postgres:16-alpine
    environment: ["POSTGRES_DB=chainscribe", "POSTGRES_USER=chainscribe", "POSTGRES_PASSWORD=chainscribe"]
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  neo4j:
    image: neo4j:5-community
    environment: ["NEO4J_AUTH=neo4j/chainscribe-dev"]
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]
  kafka:
    image: bitnami/kafka:3.9
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
volumes: { postgres_data: {}, neo4j_data: {} }
